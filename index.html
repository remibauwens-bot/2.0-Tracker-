<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Nouvelle R — Tracker</title>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Nouvelle R"/>
<link rel="manifest" href="manifest.json"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#0a0a0a;color:#fff;font-family:'Segoe UI',sans-serif;max-width:480px;margin:0 auto;padding-bottom:60px}
input,textarea,button{font-family:inherit}
.page{display:none}.page.active{display:block}
.banner{background:#000;padding:28px 20px 16px;text-align:center;border-bottom:1px solid #1e1e1e}
.logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:2px}
.logo .g{color:#f0a500;font-size:22px;font-weight:700}
.logo .w{color:#fff;font-size:28px;font-weight:900;letter-spacing:4px;text-transform:uppercase}
.logo .o{color:#f0a500;font-size:28px;font-weight:900;letter-spacing:2px}
.sub{color:#666;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-top:8px}
.name-input{margin-top:12px;display:flex;justify-content:center}
.name-input input{background:#1a1a1a;border:1px solid rgba(240,165,0,0.4);border-radius:8px;color:#fff;padding:8px 16px;font-size:14px;text-align:center;outline:none;width:230px}
.wrap{padding:18px 14px}
.streak{background:linear-gradient(135deg,#1a0f00,#0f0f0f);border:1px solid rgba(240,165,0,0.27);border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.tabs{display:flex;gap:4px;margin-bottom:16px;background:#111;border-radius:10px;padding:4px;border:1px solid #1e1e1e}
.tab{flex:1;padding:9px 4px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:12px;transition:all 0.2s;background:transparent;color:#666}
.tab.on{background:#f0a500;color:#000}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.card{background:#111;border-radius:12px;padding:16px 10px;border:1px solid #1e1e1e;text-align:center}
.card-lbl{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.card-val{font-size:36px;font-weight:900;line-height:1}
.piliers{background:#111;border-radius:12px;padding:16px;margin-bottom:16px;border:1px solid #1e1e1e}
.sec-title{font-size:9px;color:#666;letter-spacing:2px;text-transform:uppercase;margin-bottom:14px}
.bar-row{margin-bottom:12px}
.bar-lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px}
.bar-bg{background:#1e1e1e;border-radius:99px;height:5px}
.bar-fill{height:5px;border-radius:99px;transition:width 0.4s}
.chart-box{background:#111;border-radius:12px;padding:14px 14px 10px;margin-bottom:16px;border:1px solid #1e1e1e}
.cat-hd{display:flex;align-items:center;gap:8px;margin-bottom:10px;margin-top:20px}
.cat-bar{width:3px;height:16px;border-radius:2px}
.hrow{display:flex;align-items:center;gap:12px;padding:12px 14px;margin-bottom:6px;background:#111;border-radius:10px;border:1px solid #1e1e1e;cursor:pointer;transition:all 0.2s}
.hrow-chk{width:22px;height:22px;border-radius:6px;border:2px solid #2a2a2a;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.2s}
.bonus{font-size:9px;color:#f0a500;font-weight:700;border:1px solid rgba(240,165,0,0.27);border-radius:4px;padding:2px 5px}
.note-box{background:#111;border-radius:12px;padding:14px;margin-bottom:16px;border:1px solid #1e1e1e;margin-top:20px}
.note-box textarea{width:100%;background:#0f0f0f;border:1px solid #1e1e1e;border-radius:8px;color:#fff;padding:10px 12px;font-size:13px;resize:none;outline:none;line-height:1.5}
.btn-gold{width:100%;padding:13px;border-radius:12px;border:1px solid rgba(240,165,0,0.27);background:transparent;color:#f0a500;font-weight:700;font-size:13px;cursor:pointer;letter-spacing:1px;margin-top:4px}
.sync{text-align:center;font-size:10px;margin-top:10px;padding:6px;border-radius:8px;display:none}
.sync.ok{color:#22c55e;background:rgba(34,197,94,0.1)}
.sync.err{color:#ef4444;background:rgba(239,68,68,0.1)}
.sync.pend{color:#f0a500;background:rgba(240,165,0,0.1)}
.month-wrap{padding:20px 14px}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:#111;border-radius:10px;padding:10px 16px;border:1px solid #1e1e1e}
.month-nav button{background:transparent;border:none;color:#f0a500;cursor:pointer;font-size:22px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-lbl{text-align:center;font-size:9px;color:#666;padding:4px 0;font-weight:700}
.cal-day{aspect-ratio:1;border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;border:1.5px solid #1e1e1e;position:relative}
.cal-day.tap{cursor:pointer}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px;justify-content:center}
.leg-item{display:flex;align-items:center;gap:4px;font-size:9px;color:#666}
.leg-dot{width:8px;height:8px;border-radius:3px}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;display:none;align-items:flex-end;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#141414;border-radius:20px 20px 0 0;width:100%;max-width:480px;max-height:85vh;overflow-y:auto;padding:20px 18px 40px;border:1px solid #1e1e1e}
.modal-handle{width:36px;height:4px;background:#1e1e1e;border-radius:99px;margin:0 auto 20px}
.back-btn{background:transparent;border:1px solid #1e1e1e;color:#f0a500;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:13px}
</style>
</head>
<body>

<!-- PAGE MAIN -->

<div id="pg-main" class="page active">
  <div class="banner">
    <div class="logo">
      <span class="g">«</span>
      <span class="w">NOUVELLE</span>
      <span class="o"> R</span>
      <span class="g">»</span>
    </div>
    <svg viewBox="0 0 300 24" style="width:200px;display:block;margin:0 auto 8px">
      <path d="M10 18 Q80 4 150 16 Q220 28 290 10" stroke="#f0a500" stroke-width="1.5" fill="none" opacity="0.7"/>
    </svg>
    <div class="sub">Tracker · Rémi Coach Callisthénie</div>
    <div class="name-input">
      <input type="text" id="inp-name" placeholder="Prénom NOM de l'athlète"/>
    </div>
  </div>
  <div class="wrap">
    <div id="streak-box" class="streak" style="display:none">
      <span style="font-size:28px">🔥</span>
      <div>
        <div id="streak-val" style="font-size:20px;font-weight:900;color:#f0a500;line-height:1"></div>
        <div style="font-size:11px;color:#666;margin-top:2px">Série en cours — ne la brise pas !</div>
      </div>
    </div>
    <div class="tabs">
      <button class="tab on" data-p="day">Jour</button>
      <button class="tab" data-p="week">Semaine</button>
      <button class="tab" data-p="month">Mois</button>
    </div>
    <div class="cards">
      <div class="card"><div class="card-lbl" id="c1l">Aujourd'hui</div><div class="card-val" id="c1v">0%</div></div>
      <div class="card"><div class="card-lbl" id="c2l">Semaine</div><div class="card-val" id="c2v">0%</div></div>
    </div>
    <div class="piliers">
      <div class="sec-title" id="pil-title">Piliers — Aujourd'hui</div>
      <div id="pil-bars"></div>
    </div>
    <div class="chart-box">
      <div class="sec-title">📈 Évolution — 7 derniers jours</div>
      <svg id="chart-svg" viewBox="0 0 280 78" style="width:100%;overflow:visible"></svg>
    </div>
    <div id="habits-wrap"></div>
    <div class="note-box">
      <div class="sec-title">💬 Note du jour</div>
      <textarea id="inp-note" rows="2" placeholder="Une phrase sur ta journée, ta séance, ton état d'esprit..."></textarea>
    </div>
    <div id="sync-el" class="sync"></div>
    <button class="btn-gold" id="btn-month">📅 Visuel mensuel</button>
  </div>
</div>

<!-- PAGE MONTH -->

<div id="pg-month" class="page">
  <div class="month-wrap">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <button class="back-btn" id="btn-back">← Retour</button>
      <div style="text-align:center">
        <div style="font-size:9px;color:#666;letter-spacing:2px;text-transform:uppercase">Nouvelle R</div>
        <div style="font-size:14px;font-weight:700">Visuel Mensuel</div>
      </div>
      <div style="width:72px"></div>
    </div>
    <div class="month-nav">
      <button id="btn-prev">‹</button>
      <span id="month-name" style="font-weight:700;font-size:14px;text-transform:capitalize"></span>
      <button id="btn-next">›</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
      <div class="card"><div class="card-lbl">Jours ✅</div><div class="card-val" id="m-ok" style="color:#22c55e;font-size:22px">0</div></div>
      <div class="card"><div class="card-lbl">Jours 🟡</div><div class="card-val" id="m-part" style="color:#eab308;font-size:22px">0</div></div>
      <div class="card"><div class="card-lbl">Moyenne</div><div class="card-val" id="m-avg" style="color:#f0a500;font-size:22px">0%</div></div>
    </div>
    <div style="background:#111;border-radius:12px;padding:12px;border:1px solid #1e1e1e">
      <div style="display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px" id="cal-hds"></div>
      <div class="cal-grid" id="cal-grid"></div>
    </div>
    <div class="legend" id="cal-legend"></div>
    <div style="margin-top:10px;text-align:center;font-size:10px;color:#666">Appuie sur un jour passé pour voir le détail</div>
  </div>
</div>

<!-- MODAL -->

<div id="modal" class="modal-bg">
  <div class="modal">
    <div class="modal-handle"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px">
      <div>
        <div id="m-date" style="font-size:12px;color:#666;text-transform:capitalize;margin-bottom:4px"></div>
        <div id="m-score" style="font-size:34px;font-weight:900;line-height:1"></div>
        <div id="m-rest" style="font-size:11px;color:#3b82f6;margin-top:4px"></div>
      </div>
      <button id="modal-close" style="background:#2a2a2a;border:none;color:#fff;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:16px">✕</button>
    </div>
    <div id="m-note-box" style="display:none;background:rgba(240,165,0,0.07);border:1px solid rgba(240,165,0,0.2);border-radius:10px;padding:10px 14px;margin-bottom:16px">
      <div style="font-size:9px;color:#f0a500;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">💬 Note</div>
      <div id="m-note-txt" style="font-size:13px;color:#fff;line-height:1.6"></div>
    </div>
    <div id="m-habits"></div>
  </div>
</div>

<script>
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxY_d0je2AiTYeVUYTR2Gph9uSteU3nuq208SxCfRPlJ3mcB54RoApBPHLYzW1aE8MdUw/exec";

const HABITS = [
  {id:"water",      cat:"nutrition",    icon:"💧",label:"2L d'eau minimum"},
  {id:"protein",    cat:"nutrition",    icon:"🥚",label:"Quota protéines atteint"},
  {id:"meals",      cat:"nutrition",    icon:"🍽️",label:"Heures de repas régulières"},
  {id:"noProc",     cat:"nutrition",    icon:"🚫",label:"Abstinence produits transformés"},
  {id:"sleepTime",  cat:"sommeil",      icon:"🌙",label:"Heure de coucher régulière"},
  {id:"noScreen",   cat:"sommeil",      icon:"📵",label:"Écrans coupés avant de dormir"},
  {id:"wakeNat",    cat:"sommeil",      icon:"☀️",label:"Réveil sans alarme"},
  {id:"sleep7",     cat:"sommeil",      icon:"😴",label:"7h de sommeil minimum"},
  {id:"warmup",     cat:"train",        icon:"🔥",label:"Échauffement effectué"},
  {id:"training",   cat:"train",        icon:"🏋️",label:"Entraînement effectué"},
  {id:"intensity",  cat:"train",        icon:"⚡",label:"Intensité & dépassement de soi"},
  {id:"satisfied",  cat:"train",        icon:"⭐",label:"Satisfait de ma séance (bonus)"},
  {id:"visu",       cat:"mindset",      icon:"🧠",label:"Visualisation des objectifs"},
  {id:"task",       cat:"mindset",      icon:"✅",label:"Une tâche concrète effectuée"},
  {id:"why",        cat:"mindset",      icon:"🎯",label:"Évoquer son Why"},
  {id:"env",        cat:"mindset",      icon:"🌱",label:"Cultiver un environnement positif"},
];
const CATS = {
  nutrition:{label:"Nutrition & Hydratation",color:"#f0a500"},
  sommeil:  {label:"Sommeil",               color:"#a78bfa"},
  train:    {label:"Entraînement",          color:"#f97316"},
  mindset:  {label:"Mindset",               color:"#34d399"},
};

// STATE
let S = {checks:{},notes:{},athlete:""};
try{ const r=localStorage.getItem("nr2"); if(r) S=JSON.parse(r); }catch(e){}
if(!S.checks) S.checks={};
if(!S.notes)  S.notes={};
if(!S.athlete) S.athlete="";

let period="day", calY=new Date().getFullYear(), calM=new Date().getMonth();

const pad=n=>String(n).padStart(2,"0");
const toKey=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
const TODAY=new Date(); const TK=toKey(TODAY);
const dim=(y,m)=>new Date(y,m+1,0).getDate();
const shiftKey=i=>{const d=new Date(TODAY);d.setDate(TODAY.getDate()-i);return toKey(d);};

function save(){ localStorage.setItem("nr2",JSON.stringify(S)); }

function score(dk){
  if(S.checks["rest_"+dk]) return{pct:S.checks["stretch_"+dk]?105:100,isRest:true};
  const n=HABITS.filter(h=>h.id!=="satisfied");
  const done=n.filter(h=>!!S.checks[h.id+"_"+dk]).length;
  const bon=S.checks["satisfied_"+dk]?1:0;
  return{pct:Math.min(Math.round(((done+bon)/n.length)*100),105),isRest:false};
}

function col(pct,isRest){
  if(isRest) return"#3b82f6";
  if(pct>=100)return"#22c55e";
  if(pct>=70) return"#f0a500";
  if(pct>=40) return"#eab308";
  if(pct>0)   return"#ef4444";
  return"#2a2a2a";
}
function sc(p){return p>=100?"#22c55e":p>=70?"#f0a500":p>=40?"#eab308":"#ef4444";}

function streak(){
  let s=0;const d=new Date(TODAY);
  while(s<365){const dk=toKey(d);if(score(dk).pct>0){s++;d.setDate(d.getDate()-1);}else break;}
  return s;
}

function catPct(cat,days){
  const hh=HABITS.filter(h=>h.cat===cat);
  const total=hh.length*days.length;
  const done=hh.reduce((a,h)=>a+days.filter(dk=>!!S.checks[h.id+"_"+dk]).length,0);
  return total?Math.round((done/total)*100):0;
}

function render(){
  const tk=TK;
  const w7=Array.from({length:7},(_,i)=>shiftKey(i));
  const todayPct=score(tk).pct;
  const weekAvg=Math.round(w7.reduce((a,dk)=>a+score(dk).pct,0)/7);
  const dm0=dim(TODAY.getFullYear(),TODAY.getMonth());
  const mKeys=Array.from({length:dm0},(_,i)=>toKey(new Date(TODAY.getFullYear(),TODAY.getMonth(),i+1)));
  const monthAvg=Math.round(mKeys.reduce((a,dk)=>a+score(dk).pct,0)/dm0);

  // Streak
  const s=streak();
  const sb=document.getElementById("streak-box");
  if(s>0){sb.style.display="flex";document.getElementById("streak-val").textContent=s+" jour"+(s>1?"s":"");}
  else sb.style.display="none";

  // Cards
  const main=period==="day"?todayPct:period==="week"?weekAvg:monthAvg;
  const sec=period==="day"?weekAvg:period==="week"?monthAvg:todayPct;
  const ml=period==="day"?"Aujourd'hui":period==="week"?"Moy. semaine":"Moy. mois";
  const sl=period==="day"?"Semaine":period==="week"?"Mois":"Aujourd'hui";
  document.getElementById("c1l").textContent=ml;
  document.getElementById("c1v").textContent=main+"%";
  document.getElementById("c1v").style.color=sc(main);
  document.getElementById("c2l").textContent=sl;
  document.getElementById("c2v").textContent=sec+"%";
  document.getElementById("c2v").style.color=sc(sec);

  // Piliers
  document.getElementById("pil-title").textContent="Piliers — "+(period==="day"?"Aujourd'hui":period==="week"?"Semaine":"Mois");
  const days=period==="day"?[tk]:period==="week"?w7:mKeys;
  document.getElementById("pil-bars").innerHTML=Object.keys(CATS).map(cat=>{
    const {label,color}=CATS[cat];
    const pct=catPct(cat,days);
    return`<div class="bar-row"><div class="bar-lbl"><span>${label}</span><span style="color:${color};font-weight:700">${pct}%</span></div>
    <div class="bar-bg"><div class="bar-fill" style="width:${Math.min(pct,100)}%;background:${color};${pct>=100?"box-shadow:0 0 8px "+color+"66":""}"></div></div></div>`;
  }).join("");

  // Chart
  renderChart(w7.map(dk=>score(dk).pct).reverse());

  // Habits
  renderHabits();

  // Note
  document.getElementById("inp-note").value=S.notes[tk]||"";
  document.getElementById("inp-name").value=S.athlete||"";
}

function renderChart(pts){
  const W=280,H=70,p=8,xs=(W-p*2)/6;
  const days=["L","M","M","J","V","S","D"];
  const coords=pts.map((v,i)=>{
    const d=new Date(TODAY);d.setDate(TODAY.getDate()-(6-i));
    return{x:p+i*xs,y:H-p-((v/105)*(H-p*2)),v,lbl:d.toLocaleDateString("fr-FR",{weekday:"short"}).slice(0,1).toUpperCase()};
  });
  const line=coords.map((c,i)=>(i===0?"M":"L")+c.x+","+c.y).join(" ");
  const area=line+" L"+coords[coords.length-1].x+","+H+" L"+coords[0].x+","+H+" Z";
  let svg="";
  [0,50,100].forEach(v=>{const y=H-p-((v/105)*(H-p*2));svg+=`<line x1="${p}" x2="${W-p}" y1="${y}" y2="${y}" stroke="#1e1e1e" stroke-width="1"/>`;});
  svg+=`<path d="${area}" fill="rgba(240,165,0,0.08)"/>`;
  svg+=`<path d="${line}" fill="none" stroke="#f0a500" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>`;
  coords.forEach(c=>{
    svg+=`<circle cx="${c.x}" cy="${c.y}" r="3.5" fill="${col(c.v,false)}" stroke="#0a0a0a" stroke-width="1.5"/>`;
    svg+=`<text x="${c.x}" y="${H+8}" text-anchor="middle" font-size="8" fill="#666">${c.lbl}</text>`;
  });
  document.getElementById("chart-svg").innerHTML=svg;
}

function renderHabits(){
  const isRest=!!S.checks["rest_"+TK];
  let html="";
  Object.keys(CATS).forEach(cat=>{
    const {label,color}=CATS[cat];
    const isTrain=cat==="train";
    html+=`<div class="cat-hd"><div class="cat-bar" style="background:${color}"></div><span style="font-size:10px;color:${color};font-weight:700;letter-spacing:2px;text-transform:uppercase">${label}</span></div>`;
    if(isTrain){
      const rc=!!S.checks["rest_"+TK];
      html+=hrowHTML("rest_"+TK,"🛌","Jour de repos (séance non prévue)","#3b82f6",rc,false);
      if(rc){
        const sc2=!!S.checks["stretch_"+TK];
        html+=`<div style="padding-left:14px;margin-top:6px">`+hrowHTML("stretch_"+TK,"🧘","Étirements / récupération douce (bonus)","#a78bfa",sc2,true)+`</div>`;
      }
    }
    if(!isTrain||!isRest){
      HABITS.filter(h=>h.cat===cat).forEach(h=>{
        const ck=!!S.checks[h.id+"_"+TK];
        html+=hrowHTML(h.id+"_"+TK,h.icon,h.label,color,ck,h.id==="satisfied");
      });
    }
  });
  document.getElementById("habits-wrap").innerHTML=html;
  document.querySelectorAll(".hrow").forEach(el=>{
    el.addEventListener("click",()=>{
      S.checks[el.dataset.k]=!S.checks[el.dataset.k];
      save();render();syncSheet();
    });
  });
}

function hrowHTML(k,icon,label,color,checked,isBonus){
  return`<div class="hrow" data-k="${k}" style="${checked?"background:"+color+"18;border-color:"+color+"55":""}">
    <div class="hrow-chk" style="${checked?"border-color:"+color+";background:"+color:"border-color:#2a2a2a"}">${checked?'<span style="color:#000;font-size:13px;font-weight:900">✓</span>':""}</div>
    <span style="font-size:16px">${icon}</span>
    <span style="font-size:13px;color:${checked?"#fff":"#999"};flex:1">${label}</span>
    ${isBonus?'<span class="bonus">BONUS</span>':""}
  </div>`;
}

function renderMonth(){
  const dm=dim(calY,calM);
  const fd=new Date(calY,calM,1).getDay();
  const off=fd===0?6:fd-1;
  document.getElementById("month-name").textContent=new Date(calY,calM,1).toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
  const days=Array.from({length:dm},(_,i)=>{
    const d=new Date(calY,calM,i+1);
    const dk=calY+"-"+pad(calM+1)+"-"+pad(i+1);
    const future=d>TODAY;
    const {pct,isRest}=score(dk);
    return{day:i+1,dk,pct,isRest,future,isToday:dk===TK};
  });
  const filled=days.filter(d=>!d.future);
  const avg=filled.length?Math.round(filled.reduce((a,d)=>a+d.pct,0)/filled.length):0;
  document.getElementById("m-ok").textContent=filled.filter(d=>d.pct>=100).length;
  document.getElementById("m-part").textContent=filled.filter(d=>d.pct>0&&d.pct<100).length;
  document.getElementById("m-avg").textContent=avg+"%";
  document.getElementById("cal-hds").innerHTML=["L","M","M","J","V","S","D"].map(d=>`<div class="cal-lbl">${d}</div>`).join("");
  let html=Array.from({length:off}).map(()=>"<div></div>").join("");
  days.forEach(({day,dk,pct,isRest,future,isToday})=>{
    const c=future?"#2a2a2a":col(pct,isRest);
    const hasNote=S.notes&&S.notes[dk];
    const tap=!future&&pct>0;
    html+=`<div class="cal-day${tap?" tap":""}" style="background:${future?"transparent":c+"22"};border-color:${isToday?"#f0a500":future||pct===0?"#1e1e1e":c}" ${tap?'onclick="openModal(\''+dk+'\')"':""}>
      <span style="font-size:10px;font-weight:${isToday?900:500};color:${future?"#2a2a2a":isToday?"#f0a500":"#fff"}">${day}</span>
      ${!future&&pct>0?`<span style="font-size:7px;color:${c};font-weight:700;line-height:1">${pct}%</span>`:""}
      ${isRest&&!future?`<span style="font-size:7px">🛌</span>`:""}
      ${hasNote&&!future?`<div style="position:absolute;bottom:2px;right:3px;width:4px;height:4px;border-radius:50%;background:#f0a500"></div>`:""}
    </div>`;
  });
  document.getElementById("cal-grid").innerHTML=html;
  document.getElementById("cal-legend").innerHTML=[
    {c:"#22c55e",l:"100%"},{c:"#f0a500",l:"70–99%"},{c:"#eab308",l:"40–69%"},{c:"#ef4444",l:"<40%"},{c:"#3b82f6",l:"Repos"}
  ].map(({c,l})=>`<div class="leg-item"><div class="leg-dot" style="background:${c}"></div>${l}</div>`).join("");
}

function openModal(dk){
  const {pct,isRest}=score(dk);
  const c=col(pct,isRest);
  const d=new Date(dk);
  document.getElementById("m-date").textContent=d.toLocaleDateString("fr-FR",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
  document.getElementById("m-score").textContent=pct+"%";
  document.getElementById("m-score").style.color=c;
  document.getElementById("m-rest").textContent=isRest?"🛌 Jour de repos"+(S.checks["stretch_"+dk]?" · 🧘 Récupération douce":""):"";
  const note=S.notes&&S.notes[dk];
  const nb=document.getElementById("m-note-box");
  if(note){nb.style.display="block";document.getElementById("m-note-txt").textContent=note;}
  else nb.style.display="none";
  let html="";
  Object.keys(CATS).forEach(cat=>{
    const {label,color}=CATS[cat];
    const hh=HABITS.filter(h=>h.cat===cat);
    const done=hh.filter(h=>!!S.checks[h.id+"_"+dk]);
    const miss=hh.filter(h=>!S.checks[h.id+"_"+dk]);
    html+=`<div style="margin-bottom:16px"><div style="font-size:9px;color:${color};font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px"><div style="width:3px;height:12px;background:${color};border-radius:2px"></div>${label} — ${done.length}/${hh.length}</div>`;
    done.forEach(h=>{html+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:4px;background:${color}15;border-radius:8px;border:1px solid ${color}33"><span style="color:#22c55e;font-size:13px;font-weight:900">✓</span><span style="font-size:12px">${h.icon}</span><span style="font-size:12px;color:#fff">${h.label}</span></div>`;});
    miss.forEach(h=>{html+=`<div style="display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:4px;background:transparent;border-radius:8px;border:1px solid #1e1e1e"><span style="color:#2a2a2a;font-size:13px;font-weight:900">✗</span><span style="font-size:12px;opacity:0.4">${h.icon}</span><span style="font-size:12px;color:#666">${h.label}</span></div>`;});
    html+="</div>";
  });
  document.getElementById("m-habits").innerHTML=html;
  document.getElementById("modal").classList.add("open");
}

// SYNC
let syncT=null;
function syncSheet(){
  if(!S.athlete||S.athlete.trim()==="") return;
  clearTimeout(syncT);
  showSync("pend","⏳ Synchronisation...");
  syncT=setTimeout(async()=>{
    try{
      await fetch(SCRIPT_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"application/json"},
        body:JSON.stringify({athlete:S.athlete,date:TK,checks:S.checks,note:S.notes[TK]||"",score:score(TK).pct})});
      showSync("ok","✅ Synchronisé");
    }catch(e){showSync("err","❌ Erreur de sync");}
  },1500);
}
function showSync(type,msg){
  const el=document.getElementById("sync-el");
  el.style.display="block";el.className="sync "+type;el.textContent=msg;
  if(type==="ok") setTimeout(()=>{el.style.display="none";},3000);
}

// EVENTS
document.getElementById("inp-name").addEventListener("input",e=>{S.athlete=e.target.value;save();});
document.getElementById("inp-note").addEventListener("input",e=>{S.notes[TK]=e.target.value;save();syncSheet();});
document.getElementById("btn-month").addEventListener("click",()=>{
  document.getElementById("pg-main").classList.remove("active");
  document.getElementById("pg-month").classList.add("active");
  renderMonth();
});
document.getElementById("btn-back").addEventListener("click",()=>{
  document.getElementById("pg-month").classList.remove("active");
  document.getElementById("pg-main").classList.add("active");
});
document.getElementById("btn-prev").addEventListener("click",()=>{calM--;if(calM<0){calM=11;calY--;}renderMonth();});
document.getElementById("btn-next").addEventListener("click",()=>{calM++;if(calM>11){calM=0;calY++;}renderMonth();});
document.getElementById("modal-close").addEventListener("click",()=>document.getElementById("modal").classList.remove("open"));
document.getElementById("modal").addEventListener("click",e=>{if(e.target===document.getElementById("modal"))document.getElementById("modal").classList.remove("open");});
document.querySelectorAll(".tab").forEach(t=>{
  t.addEventListener("click",()=>{
    document.querySelectorAll(".tab").forEach(x=>{x.classList.remove("on");});
    t.classList.add("on");
    period=t.dataset.p;
    render();
  });
});

render();
</script>
